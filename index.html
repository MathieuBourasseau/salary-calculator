<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calculateur de salaire</title>
    <link href="./dist/output.css" rel="stylesheet"> 
    <script src="./js/main.js" defer></script>
</head>
<body 
    class="bg-light-grey"
>

    <!-- Header and nav links -->
    <!-- The first line of each class is for mobile design. -->
    <!-- The second line of each class is for tablet. -->
    <!-- The last line is for desktop. -->
    <!-- When "md" or "lg" is not included in the class, it means that the style is applied for all views. -->

    <header
        class="
            border-b-1 border-dark-grey
        "
    >
        <nav
            class="
                flex w-full p-4 text-sm justify-between items-center font-geist font-medium cursor-pointer
                "   
        >
            <div
                class="flex items-center gap-2"
            >
                <img src="./public/img/Background.svg" alt="Logo de l'entreprise Salarium">
                <a 
                    href="#"
                    class="hidden"
                >Salarium.fr</a>
            </div>
            <div
                class="flex items-center gap-2"
            >
                <a href="#">Outils</a>
                <a href="#">Guides</a>
                <a href="#">Tarifs</a>
                <a href="#">A propos</a>
                <a 
                    class="text-white py-1 px-1 bg-black rounded-xs"
                    href="#"
                    >Contact</a>
            </div>
        </nav>
    </header>

    <!-- Main and section part -->
    <main>

        <section
            class="
                flex flex-col py-6 px-4 gap-2
            "
        >
            <!-- Text above the converter -->
            <div
                class="
                    flex flex-col gap-2
                "
            >
                <p class="text-sm">outil calculateur</p>
                <h1
                class="
                    font-instrument-serif font-normal text-2xl 
                    "
                >
                 Convertissez votre <span class="italic">salaire brut en net</span>, en un coup d'oeil.
                </h1>
                <p
                    class="
                        text-sm text-text-grey
                        "
                >Saisissez un montant dans l'un ou l'autre champ - la conversion se fait automatiquement, selon votre statut et la période choisie. </p>

            </div>

            <!-- Bloc with the converter -->
            <div>

            </div>

            <!-- Bloc with sentence below the converter -->
            
        </section>


    </main>
</body>
</html>
